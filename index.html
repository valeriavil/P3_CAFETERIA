<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafetería Escolar</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="fondo">

<div class="app">

<header class="header">
    <h1>Cafetería Escolar</h1>
    <p>Práctica 2 - Sub 2</p>
</header>

<section class="alumno">
    <h2>Alumno</h2>
    <p>Valeria Vilchis Badillo</p>
</section>

<nav class="menu">
    <button onclick="mostrarSeccion('inicio')">Inicio</button>
    <button onclick="mostrarSeccion('menu')">Menú</button>
    <button onclick="mostrarSeccion('contacto')">Contacto</button>
</nav>

<main>

<section id="inicio" class="seccion activa">
    
    <img src="imagen/cafeteria.jpg" alt="cafeteria">

    <h2>Bienvenido</h2>
    <p>Esta app muestra información básica de una cafetería escolar.</p>

    <div class="horario">
        <h3>Horario</h3>
        <p>Lunes a Viernes</p>
        <p>8:00 am a 2:00 pm</p>
    </div>
</section>

<section id="menu" class="seccion">
    <h2>Menú</h2>
    <p>☕ Café - $20</p>
    <p>🥪 Sandwich - $35</p>
    <p>🧃 Jugo - $25</p>
</section>

<section id="contacto" class="seccion">
    <h2>Contacto</h2>
    <p>cafeteria@escuela.edu</p>
    <p>555-123-4567</p>
</section>

</main>

<footer class="barra">
    <span onclick="mostrarSeccion('inicio')">🏠</span>
    <span onclick="mostrarSeccion('menu')">📋</span>
    <span onclick="mostrarSeccion('contacto')">📞</span>
</footer>

</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
